          in: query
          type: string
          description: Is the location considered a reference monitor?
        - name: mobile
          in: query
          type: string
          description: Is the location considered a mobile location?
        - name: instruments_id
          in: query
          type: string
        - name: iso
          in: query
          type: string
          description: Limit the results to a specific country using ISO 3166-1 alpha-2 code
        - name: countries_id
